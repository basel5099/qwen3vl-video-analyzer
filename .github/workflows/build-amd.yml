name: build-amd-image

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/amd/**"
      - "scripts/**"
      - ".github/workflows/build-amd.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker system prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -f docker/amd/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/qwen3vl-analyzer-amd:latest .
          docker push ghcr.io/${{ github.repository_owner }}/qwen3vl-analyzer-amd:latest
