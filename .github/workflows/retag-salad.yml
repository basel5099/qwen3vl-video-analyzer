name: retag-salad-image

on:
  workflow_dispatch:
    inputs:
      digest:
        description: "Source manifest digest (sha256:...)"
        required: true
      tag:
        description: "New tag to apply"
        required: true

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/qwen3vl-analyzer-salad:${{ inputs.tag }} \
            ghcr.io/${{ github.repository_owner }}/qwen3vl-analyzer-salad@${{ inputs.digest }}
