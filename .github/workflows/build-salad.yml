name: build-salad-image

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/salad/**"
      - "scripts/**"
      - ".github/workflows/build-salad.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space and move docker to /mnt
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/local/.ghcup \
            /usr/share/swift /usr/local/julia* /opt/microsoft
          sudo docker system prune -af || true
          # the runner's /mnt disk has ~60GB free — put docker's data there
          sudo systemctl stop docker
          sudo mkdir -p /mnt/docker-data
          echo '{"data-root": "/mnt/docker-data"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          df -h / /mnt

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -f docker/salad/Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/qwen3vl-analyzer-salad:latest .
          docker push ghcr.io/${{ github.repository_owner }}/qwen3vl-analyzer-salad:latest
